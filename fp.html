<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>最后一盏灯 · 第一视角</title><link rel="stylesheet" href="fp.css"></head><body><main class="game"><header><div><small>第 <b id="day">1</b> 夜 · 收银员视角</small><h1>最后一盏灯</h1></div><div class="money">¥ <b id="cash">80</b></div></header><section class="meters"><span>库存<b id="stockText">72%</b></span><span>电力<b id="powerText">68%</b></span><span>口碑<b id="repText">12</b></span><span>时间<b id="timeText">18:00</b></span></section><section id="store" class="store"><div class="rain"></div><div class="door-glow"></div><div id="door" class="door"></div><div id="blackout" class="blackout"></div><div id="people"></div><div id="eventBanner" class="event"></div><div class="counter-edge"><span id="scanner" class="scanner"></span></div><div id="prompt" class="prompt">有人推门进来了……</div></section><section class="control"><div class="goods"><span>罐头 <b id="food">8</b></span><span>净水 <b id="water">8</b></span><span>药品 <b id="med">4</b></span><span>耐久 <b id="wall">60</b></span></div><p id="message">站在收银台后，留意每一位走近的人。</p><div class="actions"><button id="restock">呼叫补货 <small>-15</small></button><button id="serve" class="gold">确认成交</button><button id="power">启动备用电 <small>-10</small></button></div><div class="mission"><span>本夜营业额</span><b id="goal">0 / 120</b><div><i id="goalBar"></i></div></div></section><nav><button class="active">收银台</button><button id="inspect">检查线索</button><button id="refuse">拒绝交易</button><button id="endDay">关门</button></nav></main><div id="modal" class="modal hidden"><div><h2 id="modalTitle"></h2><p id="modalText"></p><button id="modalClose" class="gold">迎接下一夜</button></div></div><script src="fp.js"></script></body></html>
