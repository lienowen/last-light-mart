<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>最后一盏灯</title><link rel="stylesheet" href="shop.css"></head><body><main class="game"><header><div><small>末日便利店 · 第 <b id="day">1</b> 天</small><h1>最后一盏灯</h1></div><div class="money">¥ <b id="cash">80</b></div></header><section class="meters"><span>库存<b id="stockText">72%</b></span><span>电力<b id="powerText">68%</b></span><span>口碑<b id="repText">12</b></span><span>时间<b id="timeText">08:00</b></span></section><section class="store"><div class="rain"></div><div class="lamp a"></div><div class="lamp b"></div><div id="blackout" class="blackout"></div><button class="zone fridge" data-zone="fridge"><span>饮料冰柜</span></button><button class="zone shelf-a" data-zone="food"><img id="shelfA" src="assets/shop/shelf-full.webp"><span>食品货架</span></button><button class="zone shelf-b" data-zone="daily"><img id="shelfB" src="assets/shop/shelf-half.webp"><span>日用货架</span></button><button class="zone register" data-zone="register"><span>收银台</span><i id="queueBadge">0</i></button><button class="zone generator" data-zone="generator"><span>发电机</span></button><div id="people"></div><div id="floaters"></div><div id="eventBanner" class="event"></div></section><section class="control"><div class="status"><div><small>店内播报</small><p id="message">雨还在下，第一批顾客正赶来。</p></div><button id="speed">×1</button></div><div class="actions"><button id="restock">补货 <small>-15</small></button><button id="serve" class="gold">扫码结账</button><button id="power">发电 <small>-10</small></button></div><div class="mission"><span>今日目标</span><b id="goal">营业额 0 / 120</b><div><i id="goalBar"></i></div></div></section><nav><button class="active">商店</button><button id="inventory">仓库</button><button id="decor">改造</button><button id="endDay">打烊</button></nav></main><div id="modal" class="modal hidden"><div><h2 id="modalTitle"></h2><p id="modalText"></p><button id="modalClose" class="gold">下一天</button></div></div><script src="shop.js"></script></body></html>
